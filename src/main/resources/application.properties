spring.application.name=flowbase
flowbase.jwt.secret=${JWT_SECRET}
flowbase.jwt.expriationminutes=${JWT_EXPIRATION_MINUTES}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
flowbase.rate-limit.enabled=true
flowbase.rate-limit.default-capacity=10
flowbase.rate-limit.refill-rate=2
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
logging.pattern.console=%d{yyyy-MM-dd HH-mm-ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId}, spanId=%X{spanId}] - %msg%n
spring.jpa.open-in-view=false
management.metrics.distribution.percentiles-enabled.http.server.requests=true
management.metrics.distribution.histogramoptions.percentiles.http.server.requests=0.5,0.9,0.95,0.99